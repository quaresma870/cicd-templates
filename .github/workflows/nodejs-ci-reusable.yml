# ──────────────────────────────────────────────────────────────────────────────
# Node.js CI/CD Template — REUSABLE (workflow_call) version
#
# This is an ALTERNATIVE to templates/nodejs/ci.yml, not a replacement.
# Copying ci.yml gives you a workflow that's fully yours to edit; calling
# this one means a fix or new best practice landing here reaches every
# caller automatically, at the cost of being less visible/editable from
# the consuming repo. See the README's "How to use" section for the
# tradeoffs and pick whichever fits.
#
# NOTE on file location: GitHub Actions requires reusable workflows to live
# directly in .github/workflows/ — subdirectories aren't supported, so this
# can't live alongside the copy-paste template at templates/nodejs/ci.yml
# the way you might expect. This is the one exception to that convention.
#
# Usage from a consuming repo's own workflow:
#
#   permissions:
#     contents: read
#     id-token: write    # REQUIRED — see note below
#     packages: write    # only if deploy_target includes 'ghcr'
#
#   jobs:
#     ci:
#       uses: quaresma870/cicd-templates/.github/workflows/nodejs-ci-reusable.yml@main
#       with:
#         node_version: "22"
#         image_name: my-app
#         deploy_target: vps
#         deploy_path: /opt/my-app
#       secrets: inherit   # or pass each secret explicitly, see below
#
# ⚠️ The permissions: block above is NOT optional decoration — a calling
# workflow's permissions are a CEILING on what the called workflow's jobs
# can be granted. Omitting id-token: write on the CALLER causes the build
# job's cosign signing step to fail with an opaque "workflow file issue"
# at dispatch time, before any job even starts — see python-ci-reusable.yml
# for how this was confirmed.
#
# Stages: Lint → Test → Security Scan → Build (+ SBOM + cosign sign + SLSA attestation) → Deploy
# ──────────────────────────────────────────────────────────────────────────────

name: Node.js CI/CD (reusable)

on:
  workflow_call:
    inputs:
      node_version:
        description: "Node.js version used everywhere except the lint/test matrix (security scan, etc.)"
        type: string
        default: "22"
      node_versions:
        description: "JSON array of Node.js versions the lint/test jobs run a matrix against"
        type: string
        default: '["22"]'
      image_name:
        description: "Docker image name (without registry/owner prefix)"
        type: string
        default: "app"
      deploy_target:
        description: "Where to deploy after a successful build on main"
        type: string
        default: "ghcr"   # ghcr | vps | both | none
      deploy_path:
        description: "Path on the VPS where docker-compose.yml lives (required if deploy_target includes vps)"
        type: string
        default: ""
      coverage_threshold:
        description: "Minimum test coverage percentage (lines) required to pass"
        type: number
        default: 70
    secrets:
      GHCR_TOKEN:
        description: "GitHub token with packages:write scope — required"
        required: true
      VPS_HOST:
        description: "SSH host — required only if deploy_target includes vps"
        required: false
      VPS_USER:
        required: false
      VPS_SSH_KEY:
        required: false
      VPS_PORT:
        required: false

permissions:
  contents: read

env:
  NODE_VERSION: ${{ inputs.node_version }}
  IMAGE_NAME: ${{ inputs.image_name }}
  REGISTRY: ghcr.io

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    timeout-minutes: 10
    name: Lint (node${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJSON(inputs.node_versions) }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint

  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    timeout-minutes: 20
    name: Test (node${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJSON(inputs.node_versions) }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Run tests with coverage
        run: npm run test -- --coverage --coverageThreshold='{"global":{"lines":${{ inputs.coverage_threshold }}}}'
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-node${{ matrix.node-version }}
          path: coverage/
          retention-days: 7

  # ── Security Scan ───────────────────────────────────────────────────────────
  security:
    timeout-minutes: 15
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Audit dependencies
        run: npm audit --audit-level=high
      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: false
        continue-on-error: true
      - name: Upload OSSF results
        uses: actions/upload-artifact@v7
        with:
          name: scorecard-results
          path: scorecard-results.sarif
          retention-days: 7

  # ── Build ───────────────────────────────────────────────────────────────────
  build:
    timeout-minutes: 30
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [test, security]
    permissions:
      contents: read
      id-token: write     # needed for cosign's keyless OIDC signing + SLSA attestation below
      attestations: write # needed to publish the SLSA provenance attestation below
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_full: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=sha-
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── SBOM + signing — skipped on PR builds, which don't push an image ──────
      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Upload SBOM artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90
      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3
      - name: Sign the image (keyless, via GitHub OIDC)
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
      - name: Generate SLSA provenance attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # ── Deploy → VPS ────────────────────────────────────────────────────────────
  deploy-vps:
    timeout-minutes: 15
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      (inputs.deploy_target == 'vps' || inputs.deploy_target == 'both')
    # NOTE: environment.url deliberately does NOT reference secrets.VPS_HOST —
    # the environment block's fields don't support the secrets context, and
    # doing so fails the entire workflow at dispatch time, before any job
    # runs, with an opaque "workflow file issue" — see python-ci-reusable.yml
    # for how this was confirmed.
    environment:
      name: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd ${{ inputs.deploy_path }}
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ needs.build.outputs.image_full }}
            docker compose up -d --no-build
            docker system prune -f

      - name: Wait for application to be healthy
        run: |
          echo "Waiting for application health check..."
          MAX_WAIT=60
          ELAPSED=0
          until curl -sf "https://${{ secrets.VPS_HOST }}/health" > /dev/null 2>&1; do
            if [ $ELAPSED -ge $MAX_WAIT ]; then
              echo "Health check timed out after ${MAX_WAIT}s — rolling back"
              exit 1
            fi
            sleep 5
            ELAPSED=$((ELAPSED + 5))
            echo "  Waited ${ELAPSED}s..."
          done
          echo "Application is healthy!"
