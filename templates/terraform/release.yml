##########################################################################
# Release — Terraform
# Triggers after CI passes on main. Tag-based — Terraform modules are
# versioned by git tag/ref when referenced from another module's source
# (`source = "git::https://github.com/you/module.git?ref=v1.2.3"`), so a
# clean git tag + GitHub Release is the release artifact that matters here.
#
# Re-runs `terraform validate` against the exact tagged commit before
# creating the release/tag — belt-and-suspenders given how directly other
# infrastructure may pin to this tag.
#
# Conventional commit format:
#   feat: new feature         → minor version bump
#   fix: bug fix              → patch version bump
#   feat!: breaking change    → major version bump
#   docs:/chore: etc.         → no release
##########################################################################

name: Release (Terraform)

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_WORKING_DIR: ${{ vars.TF_WORKING_DIR || '.' }}

jobs:
  release:
    name: Validate + tag release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Re-validate before tagging
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -backend=false -input=false
          terraform validate

      - name: Configure git bot
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine next version from commits
        id: next_version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Last tag: $LAST_TAG"
          COMMITS=$(git log "${LAST_TAG}..HEAD" --format="%s" 2>/dev/null || git log --format="%s")
          MAJOR=0; MINOR=0; PATCH=0
          IFS='.' read -r V_MAJOR V_MINOR V_PATCH <<< "${LAST_TAG#v}"
          while IFS= read -r msg; do
            if echo "$msg" | grep -qE "^feat!:|BREAKING CHANGE:"; then MAJOR=1
            elif echo "$msg" | grep -qE "^feat:"; then [ $MAJOR -eq 0 ] && MINOR=1
            elif echo "$msg" | grep -qE "^fix:|^perf:"; then [ $MAJOR -eq 0 ] && [ $MINOR -eq 0 ] && PATCH=1
            fi
          done <<< "$COMMITS"
          if   [ $MAJOR -eq 1 ]; then NEXT="v$((V_MAJOR+1)).0.0"
          elif [ $MINOR -eq 1 ]; then NEXT="v${V_MAJOR}.$((V_MINOR+1)).0"
          elif [ $PATCH -eq 1 ]; then NEXT="v${V_MAJOR}.${V_MINOR}.$((V_PATCH+1))"
          else echo "No releasable commits found."; exit 0; fi
          echo "next_tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Create GitHub Release
        if: steps.next_version.outputs.next_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TAG=${{ steps.next_version.outputs.next_tag }}
          git tag "$TAG"
          git push origin "$TAG"
          NOTES=$(git log "$(git describe --tags --abbrev=0 HEAD^)..HEAD" --format="- %s" 2>/dev/null || echo "Initial release")
          gh release create "$TAG" --title "Release $TAG" --notes "$NOTES"
