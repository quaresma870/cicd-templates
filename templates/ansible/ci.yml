# ──────────────────────────────────────────────────────────────────────────────
# Ansible CI/CD Template
# Stages: Lint → Syntax Check → Security Scan → Dry Run → Deploy
#
# Required secrets:
#   ANSIBLE_VAULT_PASSWORD   — Vault password for encrypted vars
#   INVENTORY_HOST           — Target host IP/domain
#   INVENTORY_USER           — SSH user for Ansible
#   INVENTORY_SSH_KEY        — Private SSH key
#
# Required variables:
#   PLAYBOOK                 — Main playbook file (e.g. site.yml)
# ──────────────────────────────────────────────────────────────────────────────

name: Ansible CI/CD

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in check mode (dry run)"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      tags:
        description: "Ansible tags to run (comma-separated, empty = all)"
        required: false
        default: ""

# Least-privilege default — actions/checkout only needs read access here.
# Jobs that need more (e.g. commenting on a PR) declare it themselves below.
permissions:
  contents: read

env:
  ANSIBLE_FORCE_COLOR: "1"
  ANSIBLE_HOST_KEY_CHECKING: "false"
  PLAYBOOK: ${{ vars.PLAYBOOK || 'site.yml' }}

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    timeout-minutes: 10
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install Ansible + lint tools
        run: pip install ansible ansible-lint yamllint
      - name: Lint playbooks with ansible-lint
        run: ansible-lint --profile=production || ansible-lint
      - name: Lint YAML files
        run: yamllint .

  # ── Syntax Check ─────────────────────────────────────────────────────────────
  syntax:
    timeout-minutes: 10
    name: Syntax Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ansible
      - name: Check playbook syntax
        run: ansible-playbook ${{ env.PLAYBOOK }} --syntax-check -i localhost,

  # ── Security Scan ─────────────────────────────────────────────────────────────
  security:
    timeout-minutes: 15
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install tools
        run: pip install ansible checkov
      - name: Scan with Checkov
        run: |
          checkov -d . --framework ansible --output cli --soft-fail || true
      - name: Check for vault-encrypted secrets
        run: |
          # Warn if plaintext passwords found outside vault files
          if grep -rE "^(ansible_password|ansible_become_pass|vault_).*:\s+['\"]?[^!]" \
            --include="*.yml" --include="*.yaml" \
            --exclude="*vault*" --exclude-dir=".git" .; then
            echo "WARNING: Possible unencrypted secrets found. Use ansible-vault."
            exit 1
          fi
          echo "Secrets check passed."

  # ── Dry Run ───────────────────────────────────────────────────────────────────
  dry-run:
    timeout-minutes: 20
    name: Dry Run (check mode)
    runs-on: ubuntu-latest
    needs: [syntax, security]
    if: github.event_name == 'pull_request' || github.event.inputs.dry_run == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ansible
      - name: Write vault password
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass
      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.INVENTORY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
      - name: Run playbook in check mode
        run: |
          ansible-playbook ${{ env.PLAYBOOK }} \
            --check \
            --diff \
            --vault-password-file=.vault_pass \
            --private-key=~/.ssh/deploy_key \
            --user=${{ secrets.INVENTORY_USER }} \
            -i "${{ secrets.INVENTORY_HOST }}," \
            ${{ github.event.inputs.tags && format('--tags {0}', github.event.inputs.tags) || '' }}
      - name: Cleanup sensitive files
        if: always()
        run: rm -f .vault_pass ~/.ssh/deploy_key

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    timeout-minutes: 20
    name: Deploy
    runs-on: ubuntu-latest
    needs: [syntax, security]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      github.event.inputs.dry_run != 'true'
    environment:
      name: production
      # jobs.<job_id>.environment.url does NOT have the secrets context
      # available (confirmed against GitHub's own Contexts reference —
      # https://docs.github.com/en/actions/reference/workflows-and-actions/contexts#context-availability
      # — env, vars, steps, and needs ARE listed there, secrets is not),
      # so this can't reference ${{ secrets.INVENTORY_HOST }} directly.
      # steps IS allowed here, so a step's own output (computed in a
      # context where secrets IS available, like steps.run/steps.env)
      # is the correct, documented way to set a dynamic environment URL.
      url: https://${{ steps.env_url.outputs.host }}
    steps:
      - name: Compute environment URL
        id: env_url
        run: echo "host=${{ secrets.INVENTORY_HOST }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ansible
      - name: Write vault password
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass
      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.INVENTORY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
      - name: Run playbook
        run: |
          ansible-playbook ${{ env.PLAYBOOK }} \
            --vault-password-file=.vault_pass \
            --private-key=~/.ssh/deploy_key \
            --user=${{ secrets.INVENTORY_USER }} \
            -i "${{ secrets.INVENTORY_HOST }}," \
            ${{ github.event.inputs.tags && format('--tags {0}', github.event.inputs.tags) || '' }}
      - name: Cleanup sensitive files
        if: always()
        run: rm -f .vault_pass ~/.ssh/deploy_key
