# ──────────────────────────────────────────────────────────────────────────────
# Docker-only CI/CD Template
# For repos that just need to build and publish a Docker image.
# Stages: Lint Dockerfile → Security Scan → Build → Push (GHCR + VPS SSH)
#
# Required secrets:
#   GHCR_TOKEN       — GitHub token with packages:write scope
#   VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_PORT
#
# Required variables:
#   APP_NAME         — Docker image name
#   DEPLOY_PATH      — Path on VPS
# ──────────────────────────────────────────────────────────────────────────────

name: Docker CI/CD

on:
  push:
    branches: [main, dev]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform(s)"
        required: false
        default: "linux/amd64"
        type: choice
        options:
          - linux/amd64
          - linux/arm64
          - "linux/amd64,linux/arm64"

env:
  IMAGE_NAME: ${{ vars.APP_NAME || 'app' }}
  REGISTRY: ghcr.io

jobs:
  # ── Lint Dockerfile ──────────────────────────────────────────────────────────
  lint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lint with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  # ── Security Scan ────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - name: Build image for scanning (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: scan-target:latest
          cache-from: type=gha
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: scan-target:latest
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH
          vuln-type: os,library

  # ── Build & Push ─────────────────────────────────────────────────────────────
  build:
    name: Build and push
    runs-on: ubuntu-latest
    needs: [lint, security]
    outputs:
      image_full: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Build and push multi-platform
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ github.event.inputs.platform || 'linux/amd64' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy → VPS ─────────────────────────────────────────────────────────────
  deploy-vps:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: production
      url: https://${{ secrets.VPS_HOST }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd ${{ vars.DEPLOY_PATH }}
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ needs.build.outputs.image_full }}
            docker compose up -d --no-build
            docker system prune -f
