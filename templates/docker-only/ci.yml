# ──────────────────────────────────────────────────────────────────────────────
# Docker-only CI/CD Template
# For repos that just need to build and publish a Docker image.
# Stages: Lint Dockerfile → Security Scan → Build → Push (GHCR + VPS SSH)
#
# Required secrets:
#   GHCR_TOKEN       — GitHub token with packages:write scope
#   VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_PORT
#
# Required variables:
#   APP_NAME         — Docker image name
#   DEPLOY_PATH      — Path on VPS
# ──────────────────────────────────────────────────────────────────────────────

name: Docker CI/CD

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, dev]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform(s)"
        required: false
        default: "linux/amd64"
        type: choice
        options:
          - linux/amd64
          - linux/arm64
          - "linux/amd64,linux/arm64"

# Least-privilege default — actions/checkout only needs read access here.
# Jobs that need more (e.g. commenting on a PR) declare it themselves below.
permissions:
  contents: read

env:
  IMAGE_NAME: ${{ vars.APP_NAME || 'app' }}
  REGISTRY: ghcr.io

jobs:
  # ── Lint Dockerfile ──────────────────────────────────────────────────────────
  lint:
    timeout-minutes: 10
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lint with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  # ── Security Scan ────────────────────────────────────────────────────────────
  security:
    timeout-minutes: 15
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - name: Build image for scanning (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: scan-target:latest
          cache-from: type=gha
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: scan-target:latest
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH
          vuln-type: os,library

  # ── Build & Push ─────────────────────────────────────────────────────────────
  build:
    timeout-minutes: 30
    name: Build and push
    runs-on: ubuntu-latest
    needs: [lint, security]
    permissions:
      contents: read
      id-token: write   # needed for cosign's keyless OIDC signing below
    outputs:
      image_full: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Build and push multi-platform
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ github.event.inputs.platform || 'linux/amd64' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── SBOM + signing — skipped on PR builds, which don't push an image ──────
      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Upload SBOM artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90
      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3
      - name: Sign the image (keyless, via GitHub OIDC)
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"

  # ── Deploy → VPS ─────────────────────────────────────────────────────────────
  deploy-vps:
    timeout-minutes: 15
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: production
      # jobs.<job_id>.environment.url does NOT have the secrets context
      # available (confirmed against GitHub's own Contexts reference —
      # https://docs.github.com/en/actions/reference/workflows-and-actions/contexts#context-availability
      # — env, vars, steps, and needs ARE listed there, secrets is not),
      # so this can't reference ${{ secrets.VPS_HOST }} directly.
      # steps IS allowed here, so a step's own output (computed in a
      # context where secrets IS available, like steps.run/steps.env)
      # is the correct, documented way to set a dynamic environment URL.
      url: https://${{ steps.env_url.outputs.host }}
    steps:
      - name: Compute environment URL
        id: env_url
        run: echo "host=${{ secrets.VPS_HOST }}" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd ${{ vars.DEPLOY_PATH }}
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ needs.build.outputs.image_full }}
            docker compose up -d --no-build
            docker system prune -f

      - name: Wait for application to be healthy
        run: |
          echo "Waiting for application health check..."
          MAX_WAIT=60
          ELAPSED=0
          until curl -sf "https://${{ secrets.VPS_HOST }}/health" > /dev/null 2>&1; do
            if [ $ELAPSED -ge $MAX_WAIT ]; then
              echo "Health check timed out after ${MAX_WAIT}s — rolling back"
              exit 1
            fi
            sleep 5
            ELAPSED=$((ELAPSED + 5))
            echo "  Waited ${ELAPSED}s..."
          done
          echo "Application is healthy!"
