# ──────────────────────────────────────────────────────────────────────────────
# Python CI/CD Template
# Stages: Lint → Test → Security Scan → Build → Deploy (GHCR + VPS SSH)
#
# Required secrets:
#   GHCR_TOKEN       — GitHub token with packages:write scope
#   VPS_HOST         — SSH host (IP or domain)
#   VPS_USER         — SSH user
#   VPS_SSH_KEY      — Private SSH key (base64 or raw PEM)
#   VPS_PORT         — SSH port (default 22)
#
# Required variables (repo Settings → Variables):
#   APP_NAME         — Used for Docker image name and systemd service
#   DEPLOY_PATH      — Path on VPS where docker-compose.yml lives
# ──────────────────────────────────────────────────────────────────────────────

name: Python CI/CD

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, dev]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Deploy target"
        required: false
        default: "ghcr"
        type: choice
        options: [ghcr, vps, both, none]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: ${{ vars.APP_NAME || 'app' }}
  REGISTRY: ghcr.io

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    timeout-minutes: 10
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ruff
      - run: ruff check .

  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    timeout-minutes: 20
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=app --cov-report=xml --cov-fail-under=70
        env:
          ENVIRONMENT: test
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ── Security Scan ───────────────────────────────────────────────────────────
  security:
    timeout-minutes: 15
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Audit dependencies (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --format=json -o pip-audit-report.json || true
          pip-audit -r requirements.txt
      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          retention-days: 7

  # ── Build ───────────────────────────────────────────────────────────────────
  build:
    timeout-minutes: 30
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [test, security]
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_full: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=sha-
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy → VPS ────────────────────────────────────────────────────────────
  deploy-vps:
    timeout-minutes: 15
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      (github.event.inputs.deploy_target == 'vps' || github.event.inputs.deploy_target == 'both' || github.event.inputs.deploy_target == '')
    environment:
      name: production
      url: https://${{ secrets.VPS_HOST }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd ${{ vars.DEPLOY_PATH }}
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ needs.build.outputs.image_full }}
            docker compose up -d --no-build
            docker system prune -f

      - name: Wait for application to be healthy
        run: |
          echo "Waiting for application health check..."
          MAX_WAIT=60
          ELAPSED=0
          until curl -sf "https://${{ secrets.VPS_HOST }}/health" > /dev/null 2>&1; do
            if [ $ELAPSED -ge $MAX_WAIT ]; then
              echo "Health check timed out after ${MAX_WAIT}s — rolling back"
              exit 1
            fi
            sleep 5
            ELAPSED=$((ELAPSED + 5))
            echo "  Waited ${ELAPSED}s..."
          done
          echo "Application is healthy!"

