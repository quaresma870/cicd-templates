# ──────────────────────────────────────────────────────────────────────────────
# Security Audit Pipeline Template
# Standalone security pipeline — runs on schedule or on demand.
# Can be added to any repo alongside an existing CI pipeline.
#
# Covers: Secrets scan · Dependency audit · SAST · Container scan · SBOM
#
# No required secrets for basic usage.
# Optional:
#   GHCR_TOKEN       — Required only for container scan step
#   SLACK_WEBHOOK    — For Slack notifications on findings
# ──────────────────────────────────────────────────────────────────────────────

name: Security Audit

on:
  schedule:
    - cron: "0 6 * * 1"   # Every Monday at 06:00 UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      severity:
        description: "Minimum severity to report"
        required: false
        default: "HIGH"
        type: choice
        options: [LOW, MEDIUM, HIGH, CRITICAL]

env:
  SEVERITY: ${{ github.event.inputs.severity || 'HIGH' }}

jobs:
  # ── Secrets Scan ─────────────────────────────────────────────────────────────
  secrets:
    timeout-minutes: 15
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # Full history for Gitleaks
      - name: Scan for secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── Dependency Audit (Python) ─────────────────────────────────────────────────
  audit-python:
    timeout-minutes: 15
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Check for requirements file
        id: check
        run: |
          if [ -f requirements.txt ] || [ -f pyproject.toml ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Audit Python dependencies
        if: steps.check.outputs.found == 'true'
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --format=json -o pip-audit.json || \
          pip-audit --format=json -o pip-audit.json || true
          pip-audit -r requirements.txt || pip-audit
      - name: Upload audit report
        if: steps.check.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit.json
          retention-days: 30

  # ── Dependency Audit (Node.js) ───────────────────────────────────────────────
  audit-node:
    timeout-minutes: 15
    name: Node.js Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check for package.json
        id: check
        run: |
          if [ -f package.json ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.check.outputs.found == 'true'
        with:
          node-version: "22"
          cache: npm
      - name: Audit Node.js dependencies
        if: steps.check.outputs.found == 'true'
        run: |
          npm ci
          npm audit --audit-level=high --json > npm-audit.json || true
          npm audit --audit-level=high
      - name: Upload audit report
        if: steps.check.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit.json
          retention-days: 30

  # ── SAST ─────────────────────────────────────────────────────────────────────
  sast:
    timeout-minutes: 20
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/python
            p/javascript
            p/secrets
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

  # ── Filesystem Vulnerability Scan ─────────────────────────────────────────────
  trivy-fs:
    timeout-minutes: 15
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Trivy on filesystem
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: ${{ env.SEVERITY }},CRITICAL
          exit-code: "0"
      - name: Upload Trivy FS results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs-results.sarif
          retention-days: 30

  # ── Container Scan ────────────────────────────────────────────────────────────
  trivy-image:
    timeout-minutes: 20
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: security-scan:latest
          cache-from: type=gha
        continue-on-error: true
      - name: Scan container image
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: security-scan:latest
          format: sarif
          output: trivy-image-results.sarif
          severity: ${{ env.SEVERITY }},CRITICAL
          exit-code: "0"
          vuln-type: os,library
        continue-on-error: true
      - name: Upload container scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-results.sarif
          retention-days: 30

  # ── SBOM Generation ────────────────────────────────────────────────────────────
  sbom:
    timeout-minutes: 10
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90

  # ── Notify ────────────────────────────────────────────────────────────────────
  notify:
    timeout-minutes: 5
    name: Notify
    runs-on: ubuntu-latest
    needs: [secrets, audit-python, audit-node, sast, trivy-fs, sbom]
    if: always() && github.event_name == 'schedule'
    steps:
      - name: Notify Slack on failure
        if: contains(needs.*.result, 'failure') && secrets.SLACK_WEBHOOK != ''
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":warning: *Security Audit Failed* on `${{ github.repository }}`",
              "attachments": [{
                "color": "danger",
                "fields": [{
                  "title": "Run",
                  "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                  "short": false
                }]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
