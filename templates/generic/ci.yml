# ──────────────────────────────────────────────────────────────────────────────
# Generic CI/CD Template
# Language-agnostic pipeline — customise the lint/test steps for your stack.
# Stages: Validate → Test → Security Scan → Build → Deploy (GHCR + VPS SSH)
#
# Required secrets:
#   GHCR_TOKEN       — GitHub token with packages:write scope
#   VPS_HOST         — SSH host
#   VPS_USER         — SSH user
#   VPS_SSH_KEY      — Private SSH key
#   VPS_PORT         — SSH port (default 22)
#
# Required variables:
#   APP_NAME         — Docker image name
#   DEPLOY_PATH      — Path on VPS
# ──────────────────────────────────────────────────────────────────────────────

name: Generic CI/CD

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, dev]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Deploy target"
        required: false
        default: "ghcr"
        type: choice
        options: [ghcr, vps, both, none]

env:
  IMAGE_NAME: ${{ vars.APP_NAME || 'app' }}
  REGISTRY: ghcr.io

jobs:
  # ── Validate ─────────────────────────────────────────────────────────────────
  validate:
    timeout-minutes: 10
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate shell scripts
        run: |
          find . -name "*.sh" -not -path "./.git/*" | while read f; do
            bash -n "$f" && echo "OK: $f" || exit 1
          done
      - name: Validate YAML files
        run: |
          pip install yamllint -q
          find . -name "*.yml" -o -name "*.yaml" | grep -v ".git" | \
            xargs yamllint -d '{extends: relaxed, rules: {line-length: {max: 120}}}' || true
      - name: Check for secrets in code (basic)
        run: |
          if grep -rE "(password|secret|api_key|token)\s*=\s*['\"][^'\"]{8,}" \
            --include="*.py" --include="*.js" --include="*.ts" \
            --exclude-dir=".git" --exclude-dir="node_modules" .; then
            echo "WARNING: Possible hardcoded secrets detected."
            exit 1
          fi
          echo "No hardcoded secrets found."

  # ── Test ─────────────────────────────────────────────────────────────────────
  test:
    timeout-minutes: 20
    name: Test
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6
      # ── Customise below for your stack ──────────────────────────────────────
      # Python example:
      # - uses: actions/setup-python@v6
      #   with: { python-version: "3.11", cache: pip }
      # - run: pip install -r requirements.txt && pytest tests/ -v
      #
      # Node.js example:
      # - uses: actions/setup-node@v4
      #   with: { node-version: "22", cache: npm }
      # - run: npm ci && npm test
      #
      # Shell/Bash example:
      # - run: bats tests/
      # ─────────────────────────────────────────────────────────────────────────
      - name: Run tests (customise this step)
        run: echo "Add your test command here"

  # ── Security Scan ────────────────────────────────────────────────────────────
  security:
    timeout-minutes: 15
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6
      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    timeout-minutes: 30
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [test, security]
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_full: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=sha-
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy → VPS ─────────────────────────────────────────────────────────────
  deploy-vps:
    timeout-minutes: 15
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      (github.event.inputs.deploy_target == 'vps' || github.event.inputs.deploy_target == 'both' || github.event.inputs.deploy_target == '')
    environment:
      name: production
      url: https://${{ secrets.VPS_HOST }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd ${{ vars.DEPLOY_PATH }}
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ needs.build.outputs.image_full }}
            docker compose up -d --no-build
            docker system prune -f
